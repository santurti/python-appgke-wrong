<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #721e1e, #ff002b);
        }
        .converter-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: #198754;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 converter-card" style="width: 400px;">
        <h2 class="text-center mb-4">💱 Conversor de Divisas</h2>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Cantidad</label>
                <input type="number" step="0.01" name="amount" 
                       class="form-control form-control-lg" 
                       placeholder="Introduce cantidad" required>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <select name="from_currency" class="form-select">
                        <option value="EUR">EUR €</option>
                        <option value="USD">USD $</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
                <div class="col text-center align-self-center">
                    →
                </div>
                <div class="col">
                    <select name="to_currency" class="form-select">
                        <option value="USD">USD $</option>
                        <option value="EUR">EUR €</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                    Convertir
                </button>
            </div>
        </form>

        {% if result is not none %}
            <div class="mt-4 text-center result-box">
                {{ result }}
            </div>
        {% endif %}
    </div>

</body>
</html>
